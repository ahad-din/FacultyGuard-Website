[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[redirects]]
  from = "/services"
  to = "/fg-systems"
  status = 301

[[redirects]]
  from = "/resources"
  to = "/why-facultyguard"
  status = 301

[[redirects]]
  from = "/services.html"
  to = "/fg-systems"
  status = 301

[[redirects]]
  from = "/resources.html"
  to = "/why-facultyguard"
  status = 301
