[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/faculty-workflow-systems"
  to = "/faculty-workflow-systems.html"
  status = 200
[[redirects]]
  from = "/grading-workflow-tools"
  to = "/grading-workflow-tools.html"
  status = 200
[[redirects]]
  from = "/academic-integrity-templates"
  to = "/academic-integrity-templates.html"
  status = 200
[[redirects]]
  from = "/ai-policy-templates-for-faculty"
  to = "/ai-policy-templates-for-faculty.html"
  status = 200
[[redirects]]
  from = "/faculty-documentation-system"
  to = "/faculty-documentation-system.html"
  status = 200
[[redirects]]
  from = "/online-instructor-toolkit"
  to = "/online-instructor-toolkit.html"
  status = 200
